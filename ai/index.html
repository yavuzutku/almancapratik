<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Kontrol — AlmancaPratik</title>
  <meta name="description" content="Gemini destekli Almanca AI asistanı.">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/ai.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Arka plan -->
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
</div>

<!-- ERİŞİM REDDEDİLDİ -->
<div id="accessDenied" style="
  display: none;
  position: fixed; inset: 0; z-index: 999;
  align-items: center; justify-content: center;
  background: rgba(7,7,9,0.95);
  flex-direction: column; gap: 16px; text-align: center; padding: 24px;
">
  <div style="font-size: 48px;">🔒</div>
  <div style="font-family:'Syne',sans-serif; font-size: 22px; font-weight: 700; color: #f0eee8;">
    Erişim Kısıtlı
  </div>
  <div style="color: rgba(240,238,232,0.45); font-size: 14px; max-width: 320px; line-height: 1.6;">
    Bu sayfa yalnızca yetkili hesaba açıktır.
  </div>
  <button onclick="window.location.href='../anasayfa/'" style="
    margin-top: 8px; padding: 10px 24px;
    background: #c9a84c; border: none; border-radius: 10px;
    color: #0a0a0f; font-family: inherit; font-size: 14px;
    font-weight: 700; cursor: pointer;
  ">← Anasayfaya Dön</button>
</div>

<!-- ANA İÇERİK -->
<div id="aiContent" style="display: none; flex-direction: column;">

  <div class="ai-page">

    <!-- Top bar -->
    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='../anasayfa/'">← Geri</button>
      <h1 class="page-title">AI Kontrol</h1>
      <span class="admin-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Admin
      </span>
    </div>

    <!-- API Key bar -->
    <div class="api-bar">
      <span class="api-bar-label">Gemini API Key</span>
      <input
        type="password"
        id="apiKeyInput"
        class="api-input"
        placeholder="AIzaSy…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="api-save-btn" id="apiSaveBtn">Kaydet</button>
      <span class="api-status" id="apiStatus" style="display:none"></span>
    </div>

    <!-- Mode tabs -->
    <div class="mode-tabs" id="modeTabs"></div>

    <!-- Main AI panel -->
    <div class="ai-panel">

      <!-- Prompt area -->
      <div class="prompt-wrap">
        <div class="mode-hint" id="modeHint">Cümle Düzeltme & Açıklama</div>
        <textarea
          id="promptInput"
          class="prompt-textarea"
          placeholder="Almanca cümlenizi yazın, hataları düzeltelim…"
          rows="4"
          maxlength="2000"
          autocomplete="off"
          spellcheck="false"
        ></textarea>

        <div class="prompt-footer">
          <span class="char-hint" id="charHint">Ctrl+Enter ile gönder</span>
          <button class="send-btn" id="sendBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            Gönder
          </button>
        </div>

        <!-- Quick prompts -->
        <div class="quick-prompts" id="quickPrompts"></div>
      </div>

      <!-- Response area -->
      <div class="response-wrap">

        <!-- Empty state -->
        <div class="response-empty" id="responseEmpty">
          <div class="response-empty-icon">🤖</div>
          <p>Bir soru veya cümle yazın, Gemini yanıtlasın.</p>
        </div>

        <!-- Loading -->
        <div class="response-loading" id="responseLoading" style="display:none">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
          <span>Gemini düşünüyor…</span>
        </div>

        <!-- Content -->
        <div class="response-content" id="responseContent" style="display:none">
          <div class="response-header">
            <span class="response-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              Gemini Yanıtı
            </span>
            <button class="copy-resp-btn" id="copyRespBtn">Kopyala</button>
          </div>
          <div class="response-text" id="responseText"></div>
        </div>

        <!-- Error -->
        <div class="error-box" id="errorBox" style="display:none"></div>

      </div>
    </div>

    <!-- History -->
    <div class="history-strip" id="historyStrip" style="display:none">
      <div class="history-strip-header">
        <span class="history-strip-title">Son Sorular</span>
        <button class="clear-hist-btn" id="clearHistBtn">Temizle</button>
      </div>
      <div class="history-list" id="historyItems"></div>
    </div>

  </div>
</div>

<script type="module">
  import "../js/core.js";
  window.requireAuth();
  window.loadNavbar();
</script>
<script type="module" src="../js/ai.js"></script>

</body>
</html>
