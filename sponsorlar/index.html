<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsorlar — AlmancaPratik</title>
  <meta name="description" content="AlmancaPratik projesini destekleyen sponsorlarımız ve toplanan bağışlar.">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="./sponsorlar.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<main class="page">

  <!-- GERİ LİNKİ -->
  <a href="../pratik/" class="back-link">← Ana Sayfaya Dön</a>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-badge">⭐ Destekçilerimiz</div>
    <h1>Sponsorlarımız</h1>
    <p>Bu projeyi ayakta tutan, katkılarıyla güç veren herkese sonsuz teşekkürler.</p>
  </div>

  <!-- TOPLAM BAĞIŞ -->
  <div class="total-box">
    <div class="total-label">Toplam Toplanan Bağış</div>
    <div class="total-amount">
      <span>₺</span><span id="totalNum">0</span>
    </div>
    <div class="total-count" id="totalCount">0 sponsor</div>
  </div>

  <!-- PUBLIC SPONSOR GRID -->
  <div class="section-title">Sponsorlarımız</div>
  <div class="sponsor-grid" id="sponsorGrid">
    <div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🏅</div>
      <p>Yükleniyor...</p>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ADMIN ALANI (JS tarafından doldurulur) -->
  <div id="adminArea"></div>

</main>

<!-- TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- DÜZENLEME MODALİ -->
<div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
  <div class="modal">
    <h3 id="editModalTitle">✏️ Sponsoru Düzenle</h3>
    <div class="sponsor-form" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group">
        <label for="editName">İsim</label>
        <input type="text" id="editName" placeholder="Sponsor adı">
      </div>
      <div class="form-group">
        <label for="editAmount">Bağış Miktarı (₺)</label>
        <input type="number" id="editAmount" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label for="editImage">Görsel URL (opsiyonel)</label>
        <input type="url" id="editImage" placeholder="https://...">
      </div>
      <div class="form-group">
        <label for="editNote">Not (opsiyonel)</label>
        <textarea id="editNote" rows="2" placeholder="Kısa bir mesaj..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-gold" onclick="saveEdit()">💾 Kaydet</button>
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
    </div>
  </div>
</div>

<!-- NAVBAR -->
<script type="module">
  import "../js/core.js";
  window.loadNavbar?.();
</script>

<!-- SPONSOR LOGIC -->
<script type="module" src="./sponsorlar.js"></script>

</body>
</html>
