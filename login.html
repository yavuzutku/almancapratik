<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Giriş Yap — AlmancaPratik</title>

<!-- ✅ SEO: Sayfaya özel meta description -->
<meta name="description" content="AlmancaPratik'e Google hesabınla ücretsiz giriş yap. Kelime quizleri, metin analizi ve artikel bulucu ile Almancana hız kat.">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<!-- Dekoratif arka plan (aria-hidden: ekran okuyuculardan gizli) -->
<div class="bg-layer" aria-hidden="true"></div>
<div class="bg-grid"  aria-hidden="true"></div>
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>

<!-- ✅ ERİŞİLEBİLİRLİK: <main> landmark eklendi -->
<main>
  <div class="card">
    <div id="login-view">
      <div class="logo-wrap">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="logo-name">AlmancaPratik</div>
        <p class="logo-tagline">Hesabına güvenle giriş yap</p>
      </div>

      <div class="divider" aria-hidden="true"><span>Devam et</span></div>

      <!-- ✅ Google butonu JS tarafından buraya ekleniyor -->
      <div id="google-btn-container"></div>

      <div class="footer">
        <!-- ✅ ERİŞİLEBİLİRLİK: Linkler ayırt edici metin içeriyor +
             ✅ CSS'de underline eklendi (sadece renge dayalı değil) -->
        Giriş yaparak
        <a href="kullanim-sartlari.html">Kullanım Koşulları</a>'nı ve<br>
        <a href="privacy.html">Gizlilik Politikası</a>'nı kabul etmiş olursunuz.
      </div>
    </div>

    <!-- Giriş yapıldıktan sonra gösterilen panel -->
    <div class="user-panel" id="user-view" aria-live="polite">
      <img id="user-avatar" class="user-avatar" src="" alt="Profil fotoğrafı"/>
      <div>
        <div class="user-name"  id="user-name"></div>
        <div class="user-email" id="user-email"></div>
      </div>
      <div class="badge">Giriş yapıldı</div>
      <button class="signout-btn" id="logoutBtn">Çıkış Yap</button>
    </div>
  </div>
</main>

<script type="module" src="js/login.js"></script>
</body>
</html>
