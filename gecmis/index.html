<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metin Geçmişi — AlmancaPratik</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="./gecmis.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-wrap">
  <div class="top-bar">
    <button class="back-btn">← Geri</button>
    <h1 class="page-title">Metin Geçmişi</h1>
    <div class="top-bar-actions">
      <button class="select-btn" id="selectModeBtn">Seç</button>
      <button class="clear-btn" id="clearAllBtn">Tümünü Sil</button>
    </div>
  </div>

  <!-- Seçim modu araç çubuğu (varsayılan gizli) -->
  <div class="select-toolbar" id="selectToolbar" style="display:none">
    <span id="selectedCount">0 seçildi</span>
    <button class="select-all-btn" id="selectAllBtn">Tümünü seç</button>
    <button class="delete-selected-btn" id="deleteSelectedBtn" disabled>Seçilenleri Sil</button>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchInput" class="search-input" placeholder="Metinlerde ara...">
  </div>

  <div id="historyList" class="history-list">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📭</div>
      <div class="empty-text">Henüz kaydedilmiş metin yok.</div>
    </div>
  </div>
</div>

<!-- Önizleme Modal -->
<div id="previewModal" class="modal-overlay" style="display:none">
  <div class="modal-card">
    <div class="modal-header">
      <span id="modalDate" class="modal-date"></span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div id="modalText" class="modal-text"></div>
    <div class="modal-actions">
      <button class="btn-fav" id="modalFavBtn">☆ Favoriye ekle</button>
      <button class="btn-primary" id="modalRead">Okumaya Başla</button>
      <button class="btn-danger" id="modalDelete">Sil</button>
    </div>
  </div>
</div>

<script type="module">
  import "../js/core.js";
  window.loadNavbar();
  import { initAuthWall } from '../src/components/authWall.js';
  initAuthWall({
    icon:     '📂',
    title:    'Metin geçmişin için giriş yap',
    desc:     'Daha önce eklediğin metinlere geri dönmek ve okumaya devam etmek için giriş yap.',
    features: ['Tüm metinlerin', 'Hızlı erişim', 'Arama'],
    backHref: '../pratik/'
  });
</script>
<script type="module" src="./gecmis.js"></script>

</body>
</html>
