<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png">

<title>404 — Sayfa Bulunamadı | AlmancaPratik</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">

<style>
:root {
  --bg:#070709;
  --text:#f0eee8;
  --t2:rgba(240,238,232,0.52);
  --border:rgba(255,255,255,0.07);
  --gold:#c9a84c;
  --gold-l:#e8c97a;
  --fd:'Syne',sans-serif;
  --fb:'DM Sans',sans-serif;
}

body{
  margin:0;
  font-family:var(--fb);
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* background */
.bg{
  position:fixed;
  inset:0;
  z-index:0;
}

.bg-grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:52px 52px;
}

.content{
  position:relative;
  z-index:1;
  text-align:center;
  max-width:520px;
  padding:40px 20px;
}

/* 404 yazısı */
.code{
  font-family:var(--fd);
  font-size:110px;
  font-weight:800;
  letter-spacing:-4px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

/* başlık */
.title{
  font-family:var(--fd);
  font-size:28px;
  font-weight:800;
  margin-bottom:12px;
}

/* açıklama */
.desc{
  font-size:15px;
  color:var(--t2);
  line-height:1.7;
  margin-bottom:30px;
}

/* buton */
.btn{
  display:inline-block;
  padding:14px 26px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#0a0a0f;
  font-weight:700;
  border-radius:10px;
  text-decoration:none;
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

/* küçük espri */
.joke{
  margin-top:20px;
  font-size:13px;
  color:rgba(240,238,232,0.35);
}
</style>
</head>

<body>

<div class="bg">
  <div class="bg-grid"></div>
</div>

<script type="module">
  import "/js/core.js";
  window.loadNavbar();
</script>

<div class="content">

  <div class="code">404</div>

  <div class="title">Sayfa kayboldu...</div>

  <div class="desc">
    Aradığın sayfa Almanca öğrenmeye gitmiş olabilir 🇩🇪<br>
    Ama merak etme, seni geri getirebiliriz.
  </div>

  <a href="/" class="btn">Ana Sayfaya Dön</a>

  <div class="joke">
    (Ya da URL'yi yanlış yazmış olabilirsin 😅)
  </div>

</div>

</body>
</html>
